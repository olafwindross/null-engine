name: NULL ENGINE Bot — 24/7 Runner
on:
  schedule:
    # Spustí se každých 5 hodin (GitHub Actions max job = 6h)
    - cron: "0 */5 * * *"
  workflow_dispatch: # Manuální spuštění

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330 # 5.5 hodiny — pod 6h limit
    steps:
      - name: Checkout kód
        uses: actions/checkout@v4

      - name: Instalace Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalace závislostí
        run: |
          pip install "python-telegram-bot>=20.0" "pyyaml>=6.0" "requests>=2.31.0" "telegraph>=2.2.0" "aiohttp>=3.9.0"

      - name: Zápis config.yaml
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TON_ADDR: ${{ secrets.TON_ADDRESS }}
          SKRILL_ADDR: ${{ secrets.SKRILL_ADDRESS }}
        run: |
          cat > config.yaml << EOF
          telegram_token: "${TG_TOKEN}"
          ton_address: "${TON_ADDR:-EQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM8c}"
          skrill_deposit_address: "${SKRILL_ADDR:-placeholder@not-configured.dev}"
          EOF

      - name: Spuštění bota
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python null_engine.py
